<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pupillenweekend Altius — Scheidsrechter</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080d14;
  --surface: #0d1520;
  --surface2: #111c2d;
  --accent: #ff6a00;
  --accent-light: #ff8c3a;
  --accent-glow: rgba(255,106,0,0.15);
  --accent2: #f59e0b;
  --green: #22c55e;
  --muted: #4a6080;
  --text: #d4e4f7;
  --border: rgba(255,106,0,0.15);
  --border-subtle: rgba(255,255,255,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,106,0,0.02) 60px, rgba(255,106,0,0.02) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,106,0,0.02) 60px, rgba(255,106,0,0.02) 61px);
  pointer-events: none; z-index: 0;
}
.container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 36px 16px 80px; }
.hero { text-align: center; margin-bottom: 36px; }
.hero-badge {
  display: inline-block; background: var(--accent-glow); border: 1px solid var(--border);
  color: var(--accent-light); font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 3px; padding: 5px 14px; border-radius: 2px; margin-bottom: 16px; text-transform: uppercase;
}
.hero h1 {
  font-family: 'Oswald', sans-serif; font-size: clamp(26px, 6vw, 52px);
  font-weight: 700; line-height: 1.08; color: #fff; text-transform: uppercase; letter-spacing: -0.5px;
}
.hero h1 span { color: var(--accent); }
.hero p { margin-top: 10px; color: var(--muted); font-size: 14px; font-weight: 300; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.panel-title {
  font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--accent-light); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.panel-title::before { content: ''; width: 3px; height: 13px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
.panel-title.gold { color: var(--accent2); }
.panel-title.gold::before { background: var(--accent2); }

.section-label {
  font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase; margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

.back-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'Barlow', sans-serif; font-size: 13px; padding: 10px 16px;
  border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center;
  gap: 8px; margin-bottom: 28px; transition: all 0.18s; width: 100%; justify-content: center;
}
.back-btn:hover, .back-btn:active { border-color: var(--accent); color: var(--accent); }

/* GAME BUTTONS */
.games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 500px) { .games-grid { grid-template-columns: repeat(4, 1fr); } }
.game-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 10px; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 10px; text-align: center; transition: all 0.18s ease;
  position: relative; overflow: hidden; min-height: 100px; justify-content: center;
}
.game-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,106,0,0.08), transparent 60%);
  opacity: 0; transition: opacity 0.18s;
}
.game-btn:active { transform: scale(0.96); border-color: rgba(255,106,0,0.5); }
.game-btn:active::before, .game-btn:hover::before { opacity: 1; }
@media (hover:hover) { .game-btn:hover { border-color: rgba(255,106,0,0.5); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); } }
.game-icon { font-size: 26px; line-height: 1; }
.game-btn-name { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text); line-height: 1.3; }
.game-progress { font-size: 11px; color: var(--muted); font-weight: 300; }
.game-progress.done { color: var(--green); }

/* LEADERBOARD */
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th {
  font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border);
}
.lb-table td { padding: 9px 8px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.lb-table tr:last-child td { border-bottom: none; }
.lb-rank { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); width: 28px; }
.lb-table tr:first-child td { color: var(--accent-light); }
.lb-table tr:first-child .lb-rank { color: var(--accent); }
.lb-points { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; color: var(--accent-light); text-align: right; }
.lb-num { color: var(--muted); font-size: 12px; text-align: center; }

/* RESULTS */
.results-round { margin-bottom: 14px; }
.results-round-header {
  font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.r-time {
  background: var(--accent-glow); border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 7px; font-size: 10px; color: var(--accent-light);
}
.result-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: var(--surface2); border: 1px solid var(--border-subtle);
  border-radius: 7px; margin-bottom: 5px;
}
.result-team { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-team.right { text-align: right; }
.result-score {
  font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700;
  color: var(--accent-light); min-width: 52px; text-align: center;
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px;
}
.result-score.pending { color: var(--muted); font-size: 12px; font-weight: 400; }
.result-game-tag {
  font-size: 10px; color: var(--muted); white-space: nowrap;
  background: var(--surface); border: 1px solid var(--border-subtle);
  border-radius: 3px; padding: 2px 6px;
}

/* GAME PAGE */
.game-page-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.game-page-icon { font-size: 44px; line-height: 1; }
.game-page-title h2 {
  font-family: 'Oswald', sans-serif; font-size: clamp(22px, 5vw, 36px);
  font-weight: 700; text-transform: uppercase; color: #fff; line-height: 1;
}
.game-page-title p { color: var(--accent-light); font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 5px; font-family: 'Oswald', sans-serif; }

.entry-match {
  background: var(--surface2); border: 1px solid var(--border-subtle);
  border-radius: 10px; padding: 16px; margin-bottom: 10px;
}
.entry-match-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.entry-ronde { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.entry-time {
  font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--accent-light);
  background: var(--accent-glow); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px;
}
.entry-teams { display: grid; grid-template-columns: 1fr auto auto auto 1fr; align-items: center; gap: 10px; }
.entry-team { font-size: 14px; font-weight: 500; color: var(--text); }
.entry-team.right { text-align: right; }
.entry-sep { font-family: 'Oswald', sans-serif; font-size: 18px; color: var(--muted); text-align: center; width: 16px; }
.score-input {
  width: 60px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: #fff; font-family: 'Oswald', sans-serif;
  font-size: 22px; font-weight: 600; text-align: center; padding: 8px 4px;
  -moz-appearance: textfield; transition: border-color 0.15s;
}
.score-input:focus { outline: none; border-color: var(--accent); background: rgba(255,106,0,0.05); }
.score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.entry-saved { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 10px; font-size: 12px; color: var(--green); font-weight: 500; opacity: 0; transition: opacity 0.3s; }
.entry-saved.show { opacity: 1; }

@media (max-width: 480px) {
  .entry-teams { gap: 6px; }
  .score-input { width: 52px; font-size: 18px; }
  .entry-team { font-size: 12px; }
}

#page-game { display: none; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
#page-game.visible { display: block; animation: fadeIn 0.25s ease; }
</style>
</head>
<body>

<div id="page-home" class="container">
  <div class="hero">
    <div class="hero-badge">⚽ Scheidsrechter Portaal</div>
    <h1>Pupillenweekend <span>Altius</span></h1>
    <p>Kies een spel om scores in te vullen</p>
  </div>
  <div class="section-label">Kies uw spel</div>
  <div class="games-grid" id="gamesGrid"></div>
  <div class="panel" style="margin-top:28px">
    <div class="panel-title gold">Ranglijst</div>
    <table class="lb-table">
      <thead>
        <tr><th>#</th><th>Team</th><th class="lb-num">G</th><th class="lb-num">W</th><th class="lb-num">D</th><th class="lb-num">V</th><th class="lb-num">Score</th><th style="text-align:right">P</th></tr>
      </thead>
      <tbody id="leaderboard"></tbody>
    </table>
  </div>
  <div class="panel">
    <div class="panel-title">Alle Uitslagen</div>
    <div id="allResults"></div>
  </div>
</div>

<div id="page-game" class="container">
  <button class="back-btn" onclick="goHome()">← Terug naar overzicht</button>
  <div class="game-page-header">
    <div class="game-page-icon" id="gp-icon"></div>
    <div class="game-page-title"><h2 id="gp-name"></h2><p>Scores invoeren</p></div>
  </div>
  <div id="gp-matches"></div>
</div>

<script>
const GAME_ICONS = ['⚽','🎲','🏃','💨','🎯','🏃','🏓','🏟️'];
const GAMES = [
  "Penalty schieten","Dobbelsteen schieten","Stormbaan",
  "Hoe hard schiet ik?","Voetbaldart","Lopen op een bal",
  "Levend Tafelvoetbal","IPS Back to Base"
];
const TEAMS = [
  ['Japan','🇯🇵'],['Nederland','🇳🇱'],['België','🇧🇪'],['Duitsland','🇩🇪'],
  ['Italië','🇮🇹'],['Verenigde Staten','🇺🇸'],['Mexico','🇲🇽'],['Argentinië','🇦🇷'],
  ['Marokko','🇲🇦'],['Chili','🇨🇱'],['Brazilië','🇧🇷'],['Frankrijk','🇫🇷'],
  ['Spanje','🇪🇸'],['Portugal','🇵🇹'],['Zweden','🇸🇪'],['Noorwegen','🇳🇴']
];

function fmt(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function buildTimes() {
  const t = {}; let c = 19*60;
  for (let r=1;r<=8;r++) { t[r]=`${fmt(c)}–${fmt(c+15)}`; c+=15; if(r===3||r===6) c+=20; }
  return t;
}
const ROUND_TIMES = buildTimes();

// ── SCHEDULE GENERATION ──────────────────────────────
// 16 teams, 8 rounds, 8 matches per round.
// Each team plays exactly once per round, exactly once per game,
// and never meets the same opponent twice.
//
// We use the standard round-robin circle method to generate pairings,
// then assign games so each team gets each game exactly once.
//
// Pairing in round r (0-indexed): fix team 0, rotate the rest.
// This gives each team a unique opponent in each round — guaranteed
// by the circle algorithm for even N.
//
// Game assignment: for each match in round r, the two teams both
// need to be assigned game r (so each team plays game r in round r+1).
// But that only works if we rotate WHICH game each team plays.
//
// Solution: assign game index to each team-slot so that:
//   team at position p in round r plays game (p + r) % 8
// where p is the "slot pair index" (0-7).
// This ensures every team cycles through all 8 games exactly once.

function generateRounds() {
  const N = 16; // teams
  const R = 8;  // rounds = N/2
  // team indices 0..15
  const ids = Array.from({length: N}, (_,i) => i);
  const fixed = ids[0];
  let rot = ids.slice(1); // 15 elements that rotate

  const rounds = [];

  for (let r = 0; r < R; r++) {
    const circle = [fixed, ...rot]; // length 16
    const matches = [];

    for (let slot = 0; slot < R; slot++) {
      const teamA = circle[slot];
      const teamB = circle[N - 1 - slot];
      // Assign game: rotate by slot + r so each team sees each game once
      const gameIdx = (slot + r) % R;
      matches.push({
        a: teamA,
        b: teamB,
        gameIdx,
        sa: null,
        sb: null
      });
    }

    rounds.push({ round: r + 1, matches });
    // rotate: move last element of rot to front
    rot.unshift(rot.pop());
  }

  // Validate: check each team plays each game exactly once
  // (kept as comment for verification, not needed at runtime)
  // const teamGames = Array.from({length:16},()=>new Set());
  // rounds.forEach(r=>r.matches.forEach(m=>{
  //   teamGames[m.a].add(m.gameIdx); teamGames[m.b].add(m.gameIdx);
  // }));
  // teamGames.forEach((s,i)=>{ if(s.size!==8) console.error('Team',i,'plays',s.size,'games'); });

  return rounds;
}

const state = {
  players: TEAMS.map((t,i) => ({
    id: i, name: t[0], flag: t[1],
    played:0, w:0, d:0, l:0, score:0, points:0
  })),
  rounds: generateRounds()
};

function player(id) { return state.players[id]; }

function recompute() {
  state.players.forEach(p => { p.played=p.w=p.d=p.l=p.score=p.points=0; });
  state.rounds.forEach(r => r.matches.forEach(m => {
    if (m.sa !== null && m.sb !== null) {
      const a = player(m.a), b = player(m.b);
      a.played++; b.played++; a.score += m.sa; b.score += m.sb;
      if      (m.sa > m.sb) { a.w++; b.l++; a.points += 3; }
      else if (m.sb > m.sa) { b.w++; a.l++; b.points += 3; }
      else                  { a.d++; b.d++; a.points++; b.points++; }
    }
  }));
}

function renderLeaderboard() {
  const tb = document.getElementById('leaderboard');
  tb.innerHTML = '';
  [...state.players]
    .sort((a,b) => b.points - a.points || b.score - a.score)
    .forEach((p,i) => {
      tb.innerHTML += `<tr>
        <td class="lb-rank">${i+1}</td>
        <td>${p.flag} ${p.name}</td>
        <td class="lb-num">${p.played}</td><td class="lb-num">${p.w}</td>
        <td class="lb-num">${p.d}</td><td class="lb-num">${p.l}</td>
        <td class="lb-num">${p.score}</td>
        <td class="lb-points">${p.points}</td>
      </tr>`;
    });
}

function renderResults() {
  const c = document.getElementById('allResults');
  c.innerHTML = '';
  state.rounds.forEach(r => {
    const block = document.createElement('div');
    block.className = 'results-round';
    block.innerHTML = `<div class="results-round-header">Ronde ${r.round} <span class="r-time">${ROUND_TIMES[r.round]}</span></div>`;
    r.matches.forEach(m => {
      const a = player(m.a), b = player(m.b);
      const scoreHTML = (m.sa !== null && m.sb !== null)
        ? `<div class="result-score">${m.sa} – ${m.sb}</div>`
        : `<div class="result-score pending">vs</div>`;
      block.innerHTML += `
        <div class="result-row">
          <div class="result-team">${a.flag} ${a.name}</div>
          ${scoreHTML}
          <div class="result-team right">${b.flag} ${b.name}</div>
          <div class="result-game-tag">${GAMES[m.gameIdx]}</div>
        </div>`;
    });
    c.appendChild(block);
  });
}

function countFilled(gameIdx) {
  let filled = 0, total = 0;
  state.rounds.forEach(r => r.matches.forEach(m => {
    if (m.gameIdx === gameIdx) { total++; if (m.sa !== null && m.sb !== null) filled++; }
  }));
  return { filled, total };
}

function renderGameButtons() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';
  GAMES.forEach((game, gi) => {
    const { filled, total } = countFilled(gi);
    const done = filled === total;
    const btn = document.createElement('button');
    btn.className = 'game-btn';
    btn.innerHTML = `
      <div class="game-icon">${GAME_ICONS[gi]}</div>
      <div class="game-btn-name">${game}</div>
      <div class="game-progress ${done ? 'done' : ''}">${filled}/${total} ingevuld</div>`;
    btn.onclick = () => showGame(gi);
    grid.appendChild(btn);
  });
}

function showGame(gameIdx) {
  document.getElementById('gp-icon').textContent = GAME_ICONS[gameIdx];
  document.getElementById('gp-name').textContent = GAMES[gameIdx];

  const c = document.getElementById('gp-matches');
  c.innerHTML = '';

  state.rounds.forEach(r => {
    r.matches.forEach(m => {
      if (m.gameIdx !== gameIdx) return;
      const a = player(m.a), b = player(m.b);
      const card = document.createElement('div');
      card.className = 'entry-match';
      card.innerHTML = `
        <div class="entry-match-meta">
          <div class="entry-ronde">Ronde ${r.round}</div>
          <div class="entry-time">${ROUND_TIMES[r.round]}</div>
        </div>
        <div class="entry-teams">
          <div class="entry-team">${a.flag} ${a.name}</div>
          <input class="score-input" type="number" min="0" placeholder="—" value="${m.sa !== null ? m.sa : ''}">
          <div class="entry-sep">-</div>
          <input class="score-input" type="number" min="0" placeholder="—" value="${m.sb !== null ? m.sb : ''}">
          <div class="entry-team right">${b.flag} ${b.name}</div>
        </div>
        <div class="entry-saved">✓ Opgeslagen</div>`;

      const inputs = card.querySelectorAll('input');
      const savedEl = card.querySelector('.entry-saved');
      function save() {
        const va = inputs[0].value, vb = inputs[1].value;
        if (va !== '' && vb !== '') {
          m.sa = +va; m.sb = +vb;
          savedEl.classList.add('show');
          setTimeout(() => savedEl.classList.remove('show'), 1800);
          recompute();
          renderGameButtons();
        }
      }
      inputs[0].addEventListener('change', save);
      inputs[1].addEventListener('change', save);
      c.appendChild(card);
    });
  });

  document.getElementById('page-home').style.display = 'none';
  const gp = document.getElementById('page-game');
  gp.classList.add('visible');
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('page-game').classList.remove('visible');
  document.getElementById('page-home').style.display = 'block';
  renderHome();
  window.scrollTo(0, 0);
}

function renderHome() {
  recompute();
  renderGameButtons();
  renderLeaderboard();
  renderResults();
}

renderHome();
</script>
</body>
</html>
